<div id="course-content-layout">
    <div id="course-header-wrapper">

        <!-- Barre de recherche -->
        <div id="course-filters">
            <input type="text" id="search-title-input" placeholder="Rechercher par titre...">
            <input type="number" id="search-id-input" placeholder="Rechercher par ID..." min="1">

            <select id="filter-subject-select">
                <option value="">Toutes les matières</option>
                <option value="Mathématiques">Mathématiques</option>
                <option value="Histoire">Histoire</option>
                <option value="Français">Français</option>
                <option value="Physique-Chimie">Physique-Chimie</option>
                <option value="Anglais">Anglais</option>
            </select>

            <button id="reset-filters-btn">Réinitialiser</button>
        </div>

        <div id="course-counter-box">Cours : 0</div>
    </div>

    <div id="file-grid"></div>
</div>

<!-- Modale détails -->
<div id="details-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="details-title">Titre du Cours</h2>
            <button id="close-details-btn" class="close-modal-btn">&times;</button>
        </div>
        <div id="details-content"></div>
    </div>
</div>

<!-- Panneau de vote pour les étoiles -->
<!-- Modale dépôt -->
<div id="deposit-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Déposer un nouveau cours</h2>
            <button class="close-modal-btn">&times;</button>
        </div>

        <form id="deposit-form" enctype="multipart/form-data">
            <label for="course-title">Titre :</label>
            <input type="text" id="course-title" name="title" required>
            
            <label for="course-subject">Matière :</label>
            <select id="course-subject" name="subject" required>
                <option value="Mathématiques">Mathématiques</option>
                <option value="Histoire">Histoire</option>
                <option value="Français">Français</option>
                <option value="Physique-Chimie">Physique-Chimie</option>
                <option value="Anglais">Anglais</option>
            </select>

            <label for="course-description">Description :</label>
            <input type="text" id="course-description" name="description">

            <label for="deposit-file-upload">Fichier :</label>
            <input type="file" id="deposit-file-upload" name="course-file" required>

            <button id="submit-deposit-btn" type="submit">Déposer</button>
        </form>
    </div>
</div>
