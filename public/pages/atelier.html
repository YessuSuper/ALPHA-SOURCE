<div id="atelier-page">
    <!-- ── Animated BG shapes ── -->
    <div class="atelier-bg-layer" aria-hidden="true">
        <svg class="atelier-bg-svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
            <defs>
                <filter id="atl-glow">
                    <feGaussianBlur stdDeviation="18" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="atl-soft">
                    <feGaussianBlur stdDeviation="40"/>
                </filter>
            </defs>

            <!-- Soft ambient glow blobs (very blurred, large) -->
            <ellipse class="atl-ambient atl-amb-1" cx="200" cy="150" rx="220" ry="160" filter="url(#atl-soft)"/>
            <ellipse class="atl-ambient atl-amb-2" cx="900" cy="600" rx="250" ry="180" filter="url(#atl-soft)"/>
            <ellipse class="atl-ambient atl-amb-3" cx="600" cy="400" rx="180" ry="140" filter="url(#atl-soft)"/>

            <!-- Morphing blobs -->
            <path class="atl-blob atl-blob-purple" filter="url(#atl-glow)" d="M300,200 Q380,100 460,200 Q540,300 460,380 Q380,460 300,380 Q220,300 300,200Z"/>
            <path class="atl-blob atl-blob-green"  filter="url(#atl-glow)" d="M800,150 Q870,80 940,150 Q1010,220 940,290 Q870,360 800,290 Q730,220 800,150Z"/>
            <path class="atl-blob atl-blob-blue"   filter="url(#atl-glow)" d="M500,500 Q580,430 660,500 Q740,570 660,640 Q580,710 500,640 Q420,570 500,500Z"/>
            <path class="atl-blob atl-blob-orange" filter="url(#atl-glow)" d="M150,550 Q220,480 290,550 Q360,620 290,690 Q220,760 150,690 Q80,620 150,550Z"/>
            <path class="atl-blob atl-blob-accent" filter="url(#atl-glow)" d="M1000,400 Q1060,340 1120,400 Q1180,460 1120,520 Q1060,580 1000,520 Q940,460 1000,400Z"/>

            <!-- Small floating geometric shapes -->
            <polygon class="atl-shape atl-sh-1" points="180,80 200,50 220,80"/>
            <rect    class="atl-shape atl-sh-2" x="950" y="100" width="18" height="18" rx="3" transform="rotate(30 959 109)"/>
            <circle  class="atl-shape atl-sh-3" cx="700" cy="200" r="6"/>
            <polygon class="atl-shape atl-sh-4" points="400,650 420,620 440,650"/>
            <rect    class="atl-shape atl-sh-5" x="1050" y="550" width="14" height="14" rx="2" transform="rotate(45 1057 557)"/>
            <circle  class="atl-shape atl-sh-6" cx="120" cy="350" r="5"/>
            <polygon class="atl-shape atl-sh-7" points="850,700 870,670 890,700"/>
            <rect    class="atl-shape atl-sh-8" x="550" y="120" width="12" height="12" rx="2" transform="rotate(20 556 126)"/>
            <circle  class="atl-shape atl-sh-9" cx="340" cy="450" r="4"/>
            <polygon class="atl-shape atl-sh-10" points="1100,250 1115,225 1130,250"/>

            <!-- Connecting lines (faint) -->
            <line class="atl-line atl-ln-1" x1="200" y1="80" x2="550" y2="130"/>
            <line class="atl-line atl-ln-2" x1="700" y1="200" x2="950" y2="110"/>
            <line class="atl-line atl-ln-3" x1="340" y1="450" x2="500" y2="500"/>
            <line class="atl-line atl-ln-4" x1="850" y1="700" x2="1050" y2="560"/>
            <line class="atl-line atl-ln-5" x1="120" y1="350" x2="300" y2="200"/>
        </svg>
    </div>

    <div class="atelier-inner">
    <div class="atelier-header">
