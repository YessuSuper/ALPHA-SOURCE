<div id="info-layout">
    
    <div id="stats-header">
        <div id="user-info-display">
            <span class="stat-large-text" id="user-name-placeholder">Chargement...</span> 
        </div>
        
        <div id="points-display">
            <div class="stat-individual">
                <span class="stat-large-text">Points individuels : <span id="individual-points">0</span></span>
            </div>
            
            <div class="stat-collective">
                <span class="stat-small-text">Points collectifs : <span id="collective-points">0</span></span>
            </div>
        </div>
        
        <div style="width: 30%;"></div>
    </div>
    
    <div id="progress-bar-container">
        <div id="week-progress-bar">
        </div>
    </div>
    
    <!-- 🔥 NOUVEAU : Graphique d'évolution des points -->
    <div id="info-main-row">
        <div id="points-chart-container">
            <h3><div class="adaptive-icon" style="display: inline-block; vertical-align: middle; margin-right: 8px;"></div> Évolution de tes points</h3>
            <canvas id="points-chart"></canvas>
        </div>
        <div id="info-side-slot">
            <p>Espace libre pour ajouter un module ou un widget à droite.</p>
        </div>
    </div>
    
    <div id="info-content">
    </div>
</div>
