<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion a Alpha Source</title> 
    <link rel="stylesheet" href="/style.css"> 
    <link rel="stylesheet" href="/css/login.css"> 
</head>
<body>
    <div id="login-container">
        <h1>Connexion a Alpha Source</h1> 
        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="username">Identifiant</label>
                <input type="text" id="username" name="username" required autocapitalize="none" autocorrect="off" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" id="login-submit-btn">Se Connecter</button>
            <p id="error-message" style="color: red; margin-top: 10px; display: none;">Identifiants incorrects.</p>
        </form>
    </div>

    <!-- Onboarding -->
    <div id="onboarding-container" style="display: none;">
        <div id="step-1" class="step">
            <h1>Salut <span id="user-name"></span> !</h1>
            <p class="onboarding-subtitle">Choisis ta photo de profil</p>
            <p class="onboarding-hint">(optionnel, modifiable plus tard)</p>
            <div class="profile-pic-section">
                <img id="profile-preview" src="" alt="Apercu" style="display: none;">
                <input type="file" id="profile-pic-input" accept="image/*">
                <button type="button" id="choose-pic-btn" class="onboarding-btn">Choisir une photo</button>
                <button type="button" id="validate-pic-btn" class="onboarding-btn">Valider</button>
            </div>
            <button type="button" id="skip-pic-btn" class="onboarding-btn-secondary">Passer cette étape</button>
        </div>
        <div id="step-2" class="step" style="display: none;">
            <h1>Date d'anniversaire</h1>
            <div class="birth-selects">
                <select id="birth-day"><option value="" disabled selected>Jour</option></select>
                <select id="birth-month"><option value="" disabled selected>Mois</option></select>
                <select id="birth-year"><option value="" disabled selected>Année</option></select>
            </div>
            <button type="button" id="validate-birth-btn" disabled class="onboarding-btn">Valider</button>
        </div>
        <div id="step-3" class="step" style="display: none;">
            <h1>Choisis ton mot de passe</h1>
            <div class="form-group">
                <label for="new-password">Nouveau mot de passe</label>
                <input type="password" id="new-password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirmer le mot de passe</label>
                <input type="password" id="confirm-password" required>
            </div>
            <button type="button" id="validate-password-btn" disabled class="onboarding-btn">Valider</button>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
