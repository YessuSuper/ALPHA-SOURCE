<div id="chat-layout-container">
    
    <div id="main-chat-area">
        <div id="chat-box">
            <div id="chat-window">
            </div>

            <form id="chat-form">
                <textarea id="user-input" placeholder="Ton message..." rows="1"></textarea>
                <input type="text" style="display: none;" name="dummy-field" value="1">
                
                <div class="form-controls"> 
                    <label for="file-upload" class="file-button action-button" title="Joindre une image">
                        <img src="/ressources/details/dossiericon.png" alt="📁">
                    </label>
                    <input type="file" id="file-upload" accept="image/*" style="display: none;">
                    
                    <button id="new-chat-button" type="button" class="action-button" title="Nouvelle discussion">
                        Nouvelle Discussion
                    </button>

                    <button id="send-button-fixed" type="button" class="send-chat-button">Envoyer</button>

                    <select id="ai-mode-select" class="chat-mode-select">
                        <option value="basique" selected>Basique</option>
                        <option value="intelligent">Intelligent</option>
                    </select>
                </div>
            </form>

        </div>
    </div>
    
    <script>
    if (window.initChatPage) initChatPage();
    </script>

</div>
